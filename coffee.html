<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Me Coffee</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
  }

  body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
  }

  .btn{
    padding:16px 36px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2563eb; /* blue */
    color:white;
    cursor:pointer;
    transition:0.2s;
  }

  .btn:hover{
    background:#1d4ed8;
    transform:scale(1.05);
  }
</style>
</head>

<body>

<button class="btn" onclick="window.open('buymeacoffee.com/divitneedsfund')">
  Buy me a coffee
</button>

</body>
</html>
